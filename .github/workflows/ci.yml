name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: pnpm install --frozen-lockfile
      - run: pnpm docs:check
      - run: pnpm biome check .
      - run: pnpm turbo run typecheck test --continue
      - run: pnpm build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xlcmsuZXhhbXBsZS5hY2NvdW50cy5kZXYk
          CLERK_SECRET_KEY: sk_test_build_time_placeholder_for_static_ci_build
      - run: pnpm compose:validate
