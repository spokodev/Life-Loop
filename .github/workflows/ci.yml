name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - run: pnpm install --frozen-lockfile=false
      - run: pnpm docs:check
      - run: pnpm biome check .
      - run: pnpm turbo run typecheck test --continue
      - run: pnpm compose:validate
