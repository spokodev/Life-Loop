services:
  api:
    image: ${LIFE_LOOP_API_IMAGE:-ghcr.io/example/life-loop-api:latest}
    container_name: life-loop-api
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-https://life-loop.example}
      DATABASE_URL: ${DATABASE_URL:-postgres://lifeloop:change-me@postgres:5432/lifeloop}
      HOSTED_STAGING_ROOT: ${HOSTED_STAGING_ROOT:-/opt/life-loop/data/staging}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CLERK_ISSUER_URL: ${CLERK_ISSUER_URL:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CHECKOUT_PRICE_ID: ${STRIPE_CHECKOUT_PRICE_ID:-}
      STRIPE_CHECKOUT_SUCCESS_URL: ${STRIPE_CHECKOUT_SUCCESS_URL:-https://life-loop.example/settings?checkout=success}
      STRIPE_CHECKOUT_CANCEL_URL: ${STRIPE_CHECKOUT_CANCEL_URL:-https://life-loop.example/settings?checkout=cancelled}
      STRIPE_PORTAL_RETURN_URL: ${STRIPE_PORTAL_RETURN_URL:-https://life-loop.example/settings}
    volumes:
      - ${HOSTED_STAGING_ROOT:-/opt/life-loop/data/staging}:${HOSTED_STAGING_ROOT:-/opt/life-loop/data/staging}
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.life-loop-api.rule=Host(`${LIFE_LOOP_API_HOST:-api.life-loop.example}`)
      - traefik.http.routers.life-loop-api.entrypoints=websecure
      - traefik.http.services.life-loop-api.loadbalancer.server.port=4000
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: ${LIFE_LOOP_WEB_IMAGE:-ghcr.io/example/life-loop-web:latest}
    container_name: life-loop-web
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://life-loop.example}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.life-loop.example}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
    networks:
      - internal
      - traefik
    labels:
      - traefik.enable=true
      - traefik.http.routers.life-loop-web.rule=Host(`${LIFE_LOOP_WEB_HOST:-life-loop.example}`)
      - traefik.http.routers.life-loop-web.entrypoints=websecure
      - traefik.http.services.life-loop-web.loadbalancer.server.port=3000
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: life-loop-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeloop}
      POSTGRES_USER: ${POSTGRES_USER:-lifeloop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - ${POSTGRES_DATA_ROOT:-/opt/life-loop/data/postgres}:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-lifeloop} -d ${POSTGRES_DB:-lifeloop}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

networks:
  internal:
  traefik:
    external: true
